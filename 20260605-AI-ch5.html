<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP產品管理系統</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/my.css">

    <style>
        :root {
            --erp-primary: #1f2937;
            --erp-secondary: #374151;
            --erp-bg: #f4f6f9;
            --erp-success: #22c55e;
            --erp-warning: #f59e0b;
            --erp-danger: #ef4444;
            --erp-border: #d1d5db;
        }

        body {
            background-color: var(--erp-bg);
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .erp-title {
            color: var(--erp-primary);
            font-weight: 900;
            margin-top: 30px;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        .erp-table {
            background-color: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .08);
        }

        .erp-table thead {
            background-color: var(--erp-primary);
            color: white;
        }

        .erp-table th {
            text-align: center;
            vertical-align: middle;
            padding: 15px;
        }

        .erp-table td {
            vertical-align: middle;
            padding: 12px;
        }

        .product-id {
            font-weight: 700;
            color: #2563eb;
        }

        .product-name {
            font-weight: 700;
        }

        .product-price {
            color: var(--erp-danger);
            font-weight: 700;
        }

        .product-stock {
            color: var(--erp-success);
            font-weight: 700;
        }

        .product-note {
            color: #6b7280;
        }

        .table-hover tbody tr:hover {
            background-color: #eef4ff;
            transition: .3s;
        }

        @media screen and (max-width: 768px) {

            .table-rwd thead,
            caption {
                display: none;
            }

            .table-rwd tbody tr {
                display: block;
                margin-top: 20px;
                border: 2px solid var(--erp-border);
                border-radius: 10px;
                background-color: #fff;
                box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
            }

            .table-rwd tbody tr td {
                display: block;
                overflow: hidden;
                border: none;
            }

            .table-rwd tbody tr td::before {
                content: attr(data-th) ":";
                font-size: 16px;
                font-weight: bold;
                color: var(--erp-primary);
                display: block;
                float: left;
                width: 30%;
                text-align: right;
                padding-right: 1em;
            }

            .table-rwd tbody tr td span {
                display: block;
                float: left;
                width: 65%;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="display-3 text-center erp-title">
            <i class="fa-solid fa-boxes-stacked me-2"></i>
            ERP手搖飲商品管理系統
        </div>

                    <td data-th="產品價格"><span class="product-price">65元</span></td>

                </tr>

                </tr>

                    <td data-th="產品價格"><span class="product-price">35元</span></td>
                    <td data-th="產品數量"><span class="product-stock">200</span></td>
                    <td data-th="產品備註"><span class="product-note">無糖首選</span></td>
                </tr>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D004</span></td>

                    <td data-th="產品備註"><span class="product-note">鮮奶系列</span></td>
                </tr>

                </tr>

                </tr>

            </tbody>

        </table>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
